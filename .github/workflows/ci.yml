name: CI — Test & Auto-Ticket

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run all tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run unit tests (Vitest)
        run: cd frontend && npm test

      - name: Run integration tests (Jest + Supertest)
        run: cd backend && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ── AUTO-CREATE GITHUB ISSUE ON ANY FAILURE ──────────────────────────────
      - name: Create GitHub issue on test failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failedJob = context.job
            const sha = context.sha.substring(0, 7)
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const branch = context.ref.replace('refs/heads/', '')

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CI Failed: ${failedJob} on ${branch} (${sha})`,
              body: [
                '## CI Failure Report',
                '',
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**Job:** \`${failedJob}\``,
                `**Time:** ${new Date().toISOString()}`,
                '',
                `**[View Full Run Log](${runUrl})**`,
                '',
                '---',
                '*This issue was auto-created by GitHub Actions. Please investigate and close when resolved.*',
              ].join('\n'),
              labels: ['bug', 'ci-failure', 'auto-generated'],
            })
